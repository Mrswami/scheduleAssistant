name: "Operation: Polination (Mobile)"

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile_distribute.yml'

jobs:
  distribute:
    name: Build & Distribute Social Scheduler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Create Google Services JSON
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > mobile/android/app/google-services.json
          else
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"${{ secrets.FIREBASE_ANDROID_APP_ID }}","android_client_info":{"package_name":"com.mrswami.scheduleassistant"}},"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"status":1}}}]}' > mobile/android/app/google-services.json
          fi

      - name: Build Android APK (Debug)
        run: |
          cd mobile
          flutter build apk --debug 

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.HIVE_JSON }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute mobile/build/app/outputs/flutter-apk/app-debug.apk \
            --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} \
            --groups testers \
            --debug
