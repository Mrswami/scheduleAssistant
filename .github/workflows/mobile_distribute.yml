name: "Operation: Polination (Mobile)"

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'

jobs:
  distribute:
    name: Build & Distribute Social Scheduler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Create Placeholder Google Services (if missing)
        run: |
          if [ ! -f mobile/android/app/google-services.json ]; then
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"${{ secrets.FIREBASE_APP_ID_ANDROID }}","android_client_info":{"package_name":"com.mrswami.scheduleassistant"}},"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"status":1}}}]}' > mobile/android/app/google-services.json
          fi

      - name: Build Android APK (Debug)
        run: |
          cd mobile
          flutter build apk --debug 

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.HIVE_JSON }}
          groups: testers
          file: mobile/build/app/outputs/flutter-apk/app-debug.apk
